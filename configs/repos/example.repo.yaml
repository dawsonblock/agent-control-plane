# Example repo configuration for agent-control-plane.
# Copy to <name>.repo.yaml and edit path/commands for your repo.
#
# Every run of `acp run --config <this file>` reads exactly one of these.

repo:
  name: my-app
  # Replace with the absolute path to your Git repository.
  path: /home/user/projects/my-app
  default_branch: main

agent:
  # Choose the agent that runs your task. Known kinds:
  #   shell  — manual, human-in-the-loop (prints the prompt, opens a sub-shell)
  #   custom — any CLI coding agent via command_template below
  #
  # Swap agents by changing `default` (and, for custom, command_template).
  # The workflow code never changes — this is the M2 acceptance gate.
  default: shell
  timeout_seconds: 1800
  max_repair_attempts: 1
  # Used only when default: custom. Placeholders (all optional):
  #   {prompt_path}  {worktree_path}  {context_bundle_path}
  #   {artifact_dir}  {timeout}
  # Examples (uncomment and edit one):
  #   command_template: "cat {prompt_path}"                          # trivial passthrough
  #   command_template: "claude-code --prompt-file {prompt_path}"     # Claude Code CLI
  #   command_template: "codex --prompt-file {prompt_path}"           # Codex CLI
  #   command_template: "opencode run --prompt {prompt_path}"         # OpenCode
  command_template: ""
  # v0.6.7: Allow shell metacharacters (|, >, <, &, ;, $, backticks) in
  # command_template when running in worktree mode. By default these are
  # refused to prevent RCE on the host. Set to true only if you trust the
  # config and need shell features (pipes, redirects) on the host.
  # allow_shell: false
  # v0.6.4 (M9): Agent File registry — versioned, hashed agent profiles.
  # When set, build_agent verifies the selected agent's hash against the
  # registry before execution. A hash mismatch raises AgentConfigError.
  # agents_dir: agents

commands:
  # Leave a command empty ("") to skip it. Only non-empty commands run.
  install: ""
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  test: "npm test"
  build: "npm run build"

review:
  max_changed_files: 20
  max_added_lines: 1000
  block_secret_leaks: true
  warn_on_auth_changes: true
  warn_on_database_changes: true
  require_human_approval: true
  # v0.6.0: Autonomous mode — bypasses human approval for tasks that pass
  # all gates. Auto-merge merges the task branch into the default branch.
  # Both are opt-in (default False). Only enable with docker_sbx executor
  # and block_secret_leaks: true.
  # autonomous_mode: false     # true = auto-approve on PASSED (no human click)
  # auto_merge: false          # true = merge task branch into default branch
  # v0.6.8: Human firewall for auto-merge. Auto-merge is only allowed when
  # the review risk is at or below this level. Tasks above it (e.g. HIGH-
  # risk database/secret/auth changes) are downgraded to NEEDS_REVIEW so
  # a human must approve before the change reaches the default branch.
  # Default "medium". Set to "low" to require a human for any non-trivial
  # change; "high" disables the gate (not recommended).
  # auto_merge_max_risk: medium

context:
  include:
    - README.md
    - docs/**
    - src/**
    - tests/**
  exclude:
    - node_modules/**
    - .git/**
    - dist/**
    - build/**
    - .env
    - "*.key"
    - "*.pem"

memory:
  graphiti_group_id: my-app
  promote_reports_by_default: false

# v0.6.3 (M8): Skills governance — YAML playbooks that govern review,
# repair, and prompt behavior. When active_skill is set, the skill's
# prompt instructions are injected into the agent prompt and its review
# gates (hard blocks, risk elevators, required files) are applied during
# diff review.
#
# skills_dir: path to a directory containing skill .yaml or SKILL.md files
# active_skill: name of the skill to activate (leave empty for no skill)
#
# Example:
#   skills_dir: skills
#   active_skill: RefactorDatabase
skills:
  # skills_dir: skills
  # active_skill: ""

# Execution backend (v0.5.13). Determines HOW the coding agent runs.
#
#   worktree    — traditional git worktree isolation (default). The agent
#                 edits a linked worktree on a task-specific branch. This is
#                 workflow isolation, NOT a security sandbox.
#   docker_sbx  — Docker Sandboxes (sbx) microVM isolation. The agent runs
#                 inside an isolated microVM with its own Docker daemon,
#                 filesystem, and network. Clone mode gives the sandbox a
#                 private Git clone; the host repo is mounted read-only.
#                 The sandbox exposes its clone as a Git remote so ACP can
#                 fetch and diff the agent's work.
#
# When using docker_sbx, set executor.agent to the agent you want to run
# inside the sandbox (e.g. "claude", "codex", "copilot"). The agent.default
# field above is ignored for docker_sbx.
#
# Prerequisites for docker_sbx:
#   - Install sbx: https://docs.docker.com/ai/sandboxes/get-started/
#   - Run `sbx login` to authenticate
#   - Store API keys: `sbx secret set -g anthropic`
executor:
  backend: worktree
  # agent: claude              # required when backend: docker_sbx
  # sandbox_name_prefix: acp   # sandbox name = <prefix>-<task_id>
  # clone_mode: true           # MUST be true (ACP refuses non-clone mode)
  # network_policy: locked_down  # locked_down | balanced (strict enum, never open)
  # remove_after_run: false    # true = remove sandbox after run; false = keep

# v0.6.9: Agent federation via MCP (Model Context Protocol).
# When configured, ACP discovers tools from each MCP server before the
# agent runs and injects them into the agent prompt. The agent can
# request federated tool calls; ACP proxies them — the agent never
# touches the network directly. This implements the rUv federation
# concept inside the ACP vault: agents are microservices that expose
# capabilities to one another, but all calls go through the zero-trust
# control plane.
#
# Each server is a subprocess that speaks JSON-RPC 2.0 over stdio (the
# standard MCP transport). Example:
#   federation:
#     servers:
#       - name: codebase-search
#         command: ["python", "-m", "my_search_mcp_server"]
#         env:
#           API_KEY: "secret"
#         timeout_seconds: 30
federation:
  servers: []

# v0.7.3: Mid-stream sentinel — real-time safety gating during agent execution.
# When enabled, the CLIAgent switches from blocking subprocess.run to an async
# streaming path. Each line of agent stdout is fed to a StreamSentinel that
# runs safety checks BEFORE the agent finishes:
#
#   1. Kill-switch: known credential patterns (AWS, GitHub, private keys, etc.)
#      in the output stream → kill the agent immediately, write stream.aborted
#      event. This closes the risk window between agent start and post-run review.
#   2. Strange-loop detection: near-duplicate output cycles (token n-gram
#      Jaccard similarity) → kill the agent, write stream.aborted event.
#   3. Dangerous-path detection: configurable regex patterns → kill the agent.
#
# When the sentinel kills the agent, the graph short-circuits to `failed` —
# tests and review are skipped (the partial diff from a killed agent is not
# worth reviewing). All event writes are serialized via asyncio.Lock to
# preserve the hash-chain invariant.
#
# Default: disabled (streaming.enabled: false). Enable per-repo when using
# the `custom` agent (CLIAgent). Has no effect on `shell` or `docker_sbx`.
streaming:
  enabled: false
  # secret_detection: true     # scan each chunk for known credential patterns
  # strange_loop_detection: true  # detect near-duplicate output cycles
  # strange_loop_threshold: 8.0   # repetition score at which the loop detector fires
  # strange_loop_window: 10       # number of recent chunks in the rolling window
  # strange_loop_similarity: 0.65  # Jaccard threshold (0.0–1.0) for near-duplicate
  # dangerous_path_patterns: []   # regex patterns that trigger an immediate kill
  # Example dangerous_path_patterns:
  #   - r"rm\s+-rf\s+/"
  #   - r"policy\.json"
  #   - r"\.env\b"

