# Example repo configuration for agent-control-plane.
# Copy to <name>.repo.yaml and edit path/commands for your repo.
#
# Every run of `acp run --config <this file>` reads exactly one of these.

repo:
  name: my-app
  path: /Users/dawsonblock/projects/my-app
  default_branch: main

agent:
  # Choose the agent that runs your task. Known kinds:
  #   shell  — manual, human-in-the-loop (prints the prompt, opens a sub-shell)
  #   custom — any CLI coding agent via command_template below
  #
  # Swap agents by changing `default` (and, for custom, command_template).
  # The workflow code never changes — this is the M2 acceptance gate.
  default: shell
  timeout_seconds: 1800
  max_repair_attempts: 1
  # Used only when default: custom. Placeholders (all optional):
  #   {prompt_path}  {worktree_path}  {context_bundle_path}
  #   {artifact_dir}  {timeout}
  # Examples (uncomment and edit one):
  #   command_template: "cat {prompt_path}"                          # trivial passthrough
  #   command_template: "claude-code --prompt-file {prompt_path}"     # Claude Code CLI
  #   command_template: "codex --prompt-file {prompt_path}"           # Codex CLI
  #   command_template: "opencode run --prompt {prompt_path}"         # OpenCode
  command_template: ""

commands:
  # Leave a command empty ("") to skip it. Only non-empty commands run.
  install: ""
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  test: "npm test"
  build: "npm run build"

review:
  max_changed_files: 20
  max_added_lines: 1000
  block_secret_leaks: true
  warn_on_auth_changes: true
  warn_on_database_changes: true
  require_human_approval: true

context:
  include:
    - README.md
    - docs/**
    - src/**
    - tests/**
  exclude:
    - node_modules/**
    - .git/**
    - dist/**
    - build/**
    - .env
    - "*.key"
    - "*.pem"

memory:
  graphiti_group_id: my-app
  promote_reports_by_default: false

# v0.6.3 (M8): Skills governance — YAML playbooks that govern review,
# repair, and prompt behavior. When active_skill is set, the skill's
# prompt instructions are injected into the agent prompt and its review
# gates (hard blocks, risk elevators, required files) are applied during
# diff review.
#
# skills_dir: path to a directory containing skill .yaml or SKILL.md files
# active_skill: name of the skill to activate (leave empty for no skill)
#
# Example:
#   skills_dir: skills
#   active_skill: RefactorDatabase
skills:
  # skills_dir: skills
  # active_skill: ""

# Execution backend (v0.5.13). Determines HOW the coding agent runs.
#
#   worktree    — traditional git worktree isolation (default). The agent
#                 edits a linked worktree on a task-specific branch. This is
#                 workflow isolation, NOT a security sandbox.
#   docker_sbx  — Docker Sandboxes (sbx) microVM isolation. The agent runs
#                 inside an isolated microVM with its own Docker daemon,
#                 filesystem, and network. Clone mode gives the sandbox a
#                 private Git clone; the host repo is mounted read-only.
#                 The sandbox exposes its clone as a Git remote so ACP can
#                 fetch and diff the agent's work.
#
# When using docker_sbx, set executor.agent to the agent you want to run
# inside the sandbox (e.g. "claude", "codex", "copilot"). The agent.default
# field above is ignored for docker_sbx.
#
# Prerequisites for docker_sbx:
#   - Install sbx: https://docs.docker.com/ai/sandboxes/get-started/
#   - Run `sbx login` to authenticate
#   - Store API keys: `sbx secret set -g anthropic`
executor:
  backend: worktree
  # agent: claude              # required when backend: docker_sbx
  # sandbox_name_prefix: acp   # sandbox name = <prefix>-<task_id>
  # clone_mode: true           # MUST be true (ACP refuses non-clone mode)
  # network_policy: locked_down  # locked_down | balanced (strict enum, never open)
  # remove_after_run: false    # true = remove sandbox after run; false = keep

# v0.6.0: Autonomous mode — bypasses human approval for tasks that pass
# all gates. Auto-merge merges the task branch into the default branch.
# Both are opt-in (default False). Only enable with docker_sbx executor
# and block_secret_leaks: true.
review:
  # autonomous_mode: false     # true = auto-approve on PASSED (no human click)
  # auto_merge: false  # true = merge task branch into default branch

