# docker-compose.yml — FalkorDB for ACP temporal memory (M7).
#
# Usage:
#   docker compose up -d falkordb
#   uv sync --extra memory
#   acp memory promote --config configs/repos/example.repo.yaml
#
# FalkorDB is a Redis-compatible graph database. ACP connects to it on
# localhost:6379 (the default Redis port). Data persists in a Docker
# volume so temporal memories survive container restarts.

services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb-data:/data
    restart: unless-stopped

volumes:
  falkordb-data:
